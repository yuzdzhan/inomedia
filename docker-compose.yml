services:
  web:
    image: nginx:alpine
    container_name: ozzydev-inomedia-web
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      traefik.enable: "true"
      traefik.http.routers.inomedia.rule: "Host(`inomedia.dev.ozzydev.eu`)"
      traefik.http.routers.inomedia.entrypoints: "web"
      traefik.http.services.inomedia.loadbalancer.server.port: "80"
    networks:
      - proxy

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: ozzydev-inomedia-app:local
    container_name: ozzydev-inomedia-app
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      BETTER_AUTH_URL: "http://inomedia.dev.ozzydev.eu"
      NODE_ENV: "development"
    volumes:
      - ./code:/app
      - node_modules:/app/node_modules
    depends_on:
      - postgres
    networks:
      - proxy

  postgres:
    image: postgres:16-alpine
    container_name: ozzydev-inomedia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ozzydev-proxy

volumes:
  node_modules:
  postgres_data:
